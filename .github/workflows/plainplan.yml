name: PlainPlan Demo

# Runs on every PR and posts a plain-English Terraform plan review as a comment.
# Uses the free tier for public repos (GitHub OIDC) — no API key needed.
on:
  pull_request:

jobs:
  analyze:
    name: Analyze Terraform Plan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write   # post the review comment
      id-token: write        # free tier: prove repo is public via OIDC
      statuses: write        # set the `plainplan` commit status (merge gate)
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Analyze with PlainPlan
        uses: adamnmcc/plainplan-action@v1
        with:
          plan_file: plan.json
